<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portail Opportunités - Actualités Internationales</title>
<style>
body {font-family: Arial; margin:0; background:#f0f4f8;}
.hdr {background:#1a3a5c; color:#fff; padding:1.5rem; text-align:center;}
.hero {background:linear-gradient(160deg,#1a3a5c,#2c5282); color:#fff; padding:3rem 1rem; text-align:center;}
.kpis {display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; max-width:600px; margin:2rem auto;}
.kpi {background:rgba(255,255,255,.1); padding:1rem; border-radius:8px;}
.tabs {display:grid; grid-template-columns:repeat(3,1fr); margin:1rem; gap:0;}
.tab {padding:1rem; cursor:pointer; border:1px solid #ddd; background:#fff;}
.tab.on {background:#1a3a5c; color:#fff;}
.main {max-width:1200px; margin:2rem auto; padding:0 1rem;}
.grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem;}
.card {background:#fff; border:1px solid #ddd; border-radius:8px; padding:1.2rem; box-shadow:0 2px 4px rgba(0,0,0,.1);}
.card h3 {margin:0 0 0.5rem 0; color:#1a3a5c;}
.panel {display:none;}
.panel.active {display:block;}
</style>
</head>
<body>
<header class="hdr"><h1>Actualités Inter — Portail Opportunités</h1></header>
<section class="hero">
  <h2>Emplois • Concours • Bourses</h2>
  <div class="kpis">
    <div class="kpi"><strong id="ke">0</strong><br>Emplois</div>
    <div class="kpi"><strong id="kc">0</strong><br>Concours</div>
    <div class="kpi"><strong id="kb">0</strong><br>Bourses</div>
  </div>
</section>

<div class="tabs">
  <button class="tab on" data-t="e">Emploi (<span id="ce">0</span>)</button>
  <button class="tab" data-t="c">Concours (<span id="cc">0</span>)</button>
  <button class="tab" data-t="b">Bourses (<span id="cb">0</span>)</button>
</div>

<main class="main">
  <div class="panel active" id="pe"><div class="grid" id="ge"></div></div>
  <div class="panel" id="pc"><div class="grid" id="gc"></div></div>
  <div class="panel" id="pb"><div class="grid" id="gb"></div></div>
</main>

<script>
const db = {e: [], c: [], b: []};

function seed() {
  // EMPLOIS
  db.e = [
    {titre:'Data Analyst — HRW', org:'Human Rights Watch', pays:'International', lien:'https://hrw.org', tag:'new'},
    {titre:'Coordinateur Projets', org:'ActionAid', pays:'Cameroun', lien:'https://actionaid.org', tag:'cam'},
    {titre:'Dev Full Stack', org:'Flutterwave', pays:'Cameroun', lien:'https://flutterwave.com', tag:'cam'},
    {titre:'Ingénieur Cloud', org:'Microsoft', pays:'South Africa', lien:'https://microsoft.com', tag:'new'},
    {titre:'Spécialiste Genre', org:'PNUD', pays:'Mali', lien:'https://undp.org', tag:'new'},
    {titre:'Infirmier/ère', org:'MSF', pays:'International', lien:'https://msf.org', tag:'urgent'},
    {titre:'Projecteur Eau', org:'Helvetas', pays:'Cameroun', lien:'https://helvetas.org', tag:'cam'},
    {titre:'Consultant RH', org:'Deloitte', pays:'South Africa', lien:'https://deloitte.com', tag:''},
    {titre:'Agent Environnemental', org:'Earthwatch', pays:'Kenya', lien:'https://earthwatch.org', tag:''},
    {titre:'Responsable Livelihoods', org:'CRS', pays:'Cameroun', lien:'https://crs.org', tag:'cam'},
    {titre:'Technicien Forestier', org:'OIBT', pays:'Cameroun', lien:'https://itto.int', tag:'cam'},
    {titre:'Chef Marathon Entrepreneuriat', org:'TEF', pays:'Nigeria', lien:'https://tonyelumelufoundation.org', tag:''},
    {titre:'Conseiller agricole', org:'FAO', pays:'Senegal', lien:'https://fao.org', tag:''},
    {titre:'Responsable RH', org:'SOS Villages', pays:'Cameroun', lien:'https://soschildrensvillages.org', tag:'cam'},
    {titre:'Chargé Communication', org:'AfDB', pays:'International', lien:'https://afdb.org', tag:'new'},
  ];

  // CONCOURS
  db.c = [
    {titre:'Concours Fonction Publique', org:'Cameroun', pays:'Cameroun', lien:'https://minfi.cm', tag:'urgent'},
    {titre:'Hackathon Fintech', org:'AMTC', pays:'South Africa', lien:'https://amtcafrica.com', tag:'new'},
    {titre:'Prix Jeune Reporter', org:'RSF', pays:'International', lien:'https://rsf.org', tag:''},
    {titre:'Concours Policier GRC', org:'Canada', pays:'Canada', lien:'https://rcmp-grc.gc.ca', tag:''},
    {titre:'Challenge Agritech', org:'NEPAD', pays:'International', lien:'https://nepad.org', tag:'new'},
    {titre:'Défi Innovation ONU', org:'Nations Unies', pays:'International', lien:'https://un.org', tag:'new'},
    {titre:'Excellence Académique', org:'Senium', pays:'Cameroun', lien:'https://senium-africa.org', tag:'cam'},
    {titre:'Prix Littérature Africaine', org:'Académie', pays:'International', lien:'https://acad-arts-africa.org', tag:'new'},
    {titre:'Startup Africa', org:'Alibaba', pays:'International', lien:'https://alibabagroup.com', tag:''},
    {titre:'Challenge Santé', org:'Gates Foundation', pays:'International', lien:'https://gatesfoundation.org', tag:''},
  ];

  // BOURSES
  db.b = [
    {titre:'Bourse Chevening', org:'UK', pays:'Royaume-Uni', lien:'https://chevening.org', tag:'urgent'},
    {titre:'Bourse Princeton', org:'Princeton', pays:'USA', lien:'https://africanastudies.org', tag:'urgent'},
    {titre:'Bourse Norwège', org:'Norway', pays:'Norway', lien:'https://norad.no', tag:''},
    {titre:'Bourse Koshland', org:'Koshland', pays:'USA', lien:'https://koshlandfoundation.org', tag:''},
    {titre:'Bourse TWAS', org:'TWAS', pays:'Switzerland', lien:'https://twas.org', tag:''},
    {titre:'Bourse AFS', org:'AFS', pays:'International', lien:'https://afs.org', tag:''},
    {titre:'Bourse Indonesia', org:'LPDP', pays:'Indonesia', lien:'https://lpdp.kemenkeu.go.id', tag:''},
    {titre:'Bourse EMBO', org:'EMBO', pays:'Europe', lien:'https://embo.org', tag:''},
    {titre:'Grant Wellcome', org:'Wellcome Trust', pays:'UK', lien:'https://wellcome.org', tag:''},
    {titre:'Bourse TWAS Doctorat', org:'TWAS', pays:'Switzerland', lien:'https://twas.org', tag:''},
  ];

  console.log('Seeds:', db.e.length, db.c.length, db.b.length);
}

function render() {
  seed();
  ['e','c','b'].forEach(t => {
    const grid = document.getElementById('g'+t);
    const count = document.getElementById('c'+t);
    const kpi = document.getElementById('k'+t);
    
    count.textContent = db[t].length;
    kpi.textContent = db[t].length;
    
    grid.innerHTML = db[t].map(item => `
      <div class="card">
        <h3>${item.titre}</h3>
        <p><strong>${item.org}</strong> • ${item.pays}</p>
        <a href="${item.lien}" target="_blank">Postuler →</a>
      </div>
    `).join('');
  });
}

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('on');
    document.getElementById('p' + btn.dataset.t).classList.add('active');
  });
});

window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
